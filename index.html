<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRONOS // Experimental Additive Drone Synthesizer</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app-container">
        <!-- Unified Background Canvas -->
        <canvas id="canvas-visualizer"></canvas>

        <!-- Overlay Header -->
        <header class="overlay-header">
            <div class="header-left">
                <span class="brand">KRONOS</span>
                <span class="tagline">drone synthesis laboratory</span>
            </div>
            <div class="header-right">
                <span class="build-version">BUILD #{{BUILD_NUMBER}}</span>
            </div>
        </header>

        <!-- Left Side Floating Control Panel -->
        <section class="control-panel-left">
            <div class="sliders-container">
                <div class="slider-wrapper" data-param="detune">
                    <div class="slider-header">
                        <span class="slider-num">01</span>
                        <span class="slider-name">DETUNE</span>
                        <span class="slider-val" id="val-detune">0.00</span>
                    </div>
                    <div class="custom-slider" id="slider-detune">
                        <div class="slider-track">
                            <div class="slider-fill"></div>
                            <div class="slider-thumb"></div>
                        </div>
                    </div>
                </div>

                <div class="slider-wrapper" data-param="timbre">
                    <div class="slider-header">
                        <span class="slider-num">02</span>
                        <span class="slider-name">TIMBRE</span>
                        <span class="slider-val" id="val-timbre">0.25</span>
                    </div>
                    <div class="custom-slider" id="slider-timbre">
                        <div class="slider-track">
                            <div class="slider-fill"></div>
                            <div class="slider-thumb"></div>
                        </div>
                    </div>
                </div>

                <div class="slider-wrapper" data-param="cutoff">
                    <div class="slider-header">
                        <span class="slider-num">03</span>
                        <span class="slider-name">CUTOFF</span>
                        <span class="slider-val" id="val-cutoff">0.75</span>
                    </div>
                    <div class="custom-slider" id="slider-cutoff">
                        <div class="slider-track">
                            <div class="slider-fill"></div>
                            <div class="slider-thumb"></div>
                        </div>
                    </div>
                </div>

                <div class="slider-wrapper" data-param="space">
                    <div class="slider-header">
                        <span class="slider-num">04</span>
                        <span class="slider-name">SPACE</span>
                        <span class="slider-val" id="val-space">0.30</span>
                    </div>
                    <div class="custom-slider" id="slider-space">
                        <div class="slider-track">
                            <div class="slider-fill"></div>
                            <div class="slider-thumb"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Compact ADSR Outlined Knobs Panel -->
            <div class="adsr-container">
                <div class="adsr-title">ENVELOPE (ADSR)</div>
                <div class="knobs-row">
                    <div class="knob-wrapper" data-param="attack">
                        <div class="custom-knob" id="knob-attack">
                            <div class="knob-dial">
                                <div class="knob-marker"></div>
                            </div>
                        </div>
                        <span class="knob-name">A</span>
                        <span class="knob-val" id="val-attack">0.80s</span>
                    </div>
                    <div class="knob-wrapper" data-param="decay">
                        <div class="custom-knob" id="knob-decay">
                            <div class="knob-dial">
                                <div class="knob-marker"></div>
                            </div>
                        </div>
                        <span class="knob-name">D</span>
                        <span class="knob-val" id="val-decay">0.30s</span>
                    </div>
                    <div class="knob-wrapper" data-param="sustain">
                        <div class="custom-knob" id="knob-sustain">
                            <div class="knob-dial">
                                <div class="knob-marker"></div>
                            </div>
                        </div>
                        <span class="knob-name">S</span>
                        <span class="knob-val" id="val-sustain">0.80</span>
                    </div>
                    <div class="knob-wrapper" data-param="release">
                        <div class="custom-knob" id="knob-release">
                            <div class="knob-dial">
                                <div class="knob-marker"></div>
                            </div>
                        </div>
                        <span class="knob-name">R</span>
                        <span class="knob-val" id="val-release">1.50s</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Right Side Floating Control Panel (Symmetric Sliders) -->
        <section class="control-panel-right">
            <div class="sliders-container">
                <div class="slider-wrapper" data-param="alter">
                    <div class="slider-header">
                        <span class="slider-num">05</span>
                        <span class="slider-name">ALTER</span>
                        <span class="slider-val" id="val-alter">0.00</span>
                    </div>
                    <div class="custom-slider" id="slider-alter">
                        <div class="slider-track">
                            <div class="slider-fill"></div>
                            <div class="slider-thumb"></div>
                        </div>
                    </div>
                </div>

                <div class="slider-wrapper" data-param="size">
                    <div class="slider-header">
                        <span class="slider-num">06</span>
                        <span class="slider-name">SIZE</span>
                        <span class="slider-val" id="val-size">0.50</span>
                    </div>
                    <div class="custom-slider" id="slider-size">
                        <div class="slider-track">
                            <div class="slider-fill"></div>
                            <div class="slider-thumb"></div>
                        </div>
                    </div>
                </div>

                <div class="slider-wrapper" data-param="sweep">
                    <div class="slider-header">
                        <span class="slider-num">07</span>
                        <span class="slider-name">SWEEP</span>
                        <span class="slider-val" id="val-sweep">0.50</span>
                    </div>
                    <div class="custom-slider" id="slider-sweep">
                        <div class="slider-track">
                            <div class="slider-fill"></div>
                            <div class="slider-thumb"></div>
                        </div>
                    </div>
                </div>

                <div class="slider-wrapper" data-param="cloud">
                    <div class="slider-header">
                        <span class="slider-num">08</span>
                        <span class="slider-name">CLOUD</span>
                        <span class="slider-val" id="val-cloud">0.30</span>
                    </div>
                    <div class="custom-slider" id="slider-cloud">
                        <div class="slider-track">
                            <div class="slider-fill"></div>
                            <div class="slider-thumb"></div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Spacer matching the height of left ADSR for perfect vertical symmetry -->
            <div class="adsr-spacer"></div>
        </section>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
